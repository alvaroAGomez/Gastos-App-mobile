<div class="stat-card" [ngClass]="type">
    <div class="flex flex-col items-center justify-center p-6 rounded-3xl"
        [ngClass]="type === 'primary' ? 'bg-navy-900/40 backdrop-blur-md border border-white/5' : 'bg-navy-800/30 border border-white/5'">

        <span class="text-xs font-medium tracking-widest text-white/50 uppercase mb-2">{{ label }}</span>

        <div class="flex items-center gap-2">
            <h2 class="text-4xl font-bold tracking-tight"
                [ngClass]="type === 'primary' ? 'text-emerald-400' : 'text-white'">
                {{ value | currency:'ARS':'symbol-narrow':'1.2-2' }}
            </h2>
        </div>

        <div *ngIf="trend" class="mt-3 flex items-center px-3 py-1 bg-white/5 rounded-full">
            <ion-icon name="trending-up" class="text-emerald-400 mr-2"></ion-icon>
            <span class="text-xs font-medium text-white/80">{{ trend }}</span>
        </div>

        <div *ngIf="description" class="mt-2 text-xs text-white/40">
            {{ description }}
        </div>
    </div>
</div>
