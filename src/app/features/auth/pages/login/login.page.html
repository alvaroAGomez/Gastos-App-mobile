<ion-content class="ion-padding">
    <div class="login-container">
        <div class="logo-section">
            <ion-icon name="wallet" size="large"></ion-icon>
            <h1>Gastos App</h1>
            <p>Control de gastos con tarjetas</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <ion-item>
                <ion-label position="floating">Email</ion-label>
                <ion-input type="email" formControlName="email" autocomplete="email">
                </ion-input>
            </ion-item>
            <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <small *ngIf="loginForm.get('email')?.errors?.['required']">El email es requerido</small>
                <small *ngIf="loginForm.get('email')?.errors?.['email']">Email inválido</small>
            </div>

            <ion-item>
                <ion-label position="floating">Contraseña</ion-label>
                <ion-input type="password" formControlName="password" autocomplete="current-password">
                </ion-input>
            </ion-item>
            <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <small *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida</small>
                <small *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres</small>
            </div>

            <ion-button expand="block" type="submit" class="submit-btn" [disabled]="loginForm.invalid">
                Iniciar Sesión
            </ion-button>
        </form>

        <div class="divider">
            <span>o continúa con</span>
        </div>

        <div class="social-login-container">
            <app-social-button [provider]="SocialProvider.GOOGLE" label="Google" [loading]="isLoadingSocial"
                (onClick)="onSocialLogin(SocialProvider.GOOGLE)">
            </app-social-button>

            <app-social-button [provider]="SocialProvider.FACEBOOK" label="Facebook" [loading]="isLoadingSocial"
                (onClick)="onSocialLogin(SocialProvider.FACEBOOK)">
            </app-social-button>

            <app-social-button [provider]="SocialProvider.TWITTER" label="X (Twitter)" [loading]="isLoadingSocial"
                (onClick)="onSocialLogin(SocialProvider.TWITTER)">
            </app-social-button>

            <app-social-button [provider]="SocialProvider.APPLE" label="Apple" [loading]="isLoadingSocial"
                (onClick)="onSocialLogin(SocialProvider.APPLE)">
            </app-social-button>
        </div>

        <div class="register-link">
            <p>¿No tienes cuenta? <a (click)="goToRegister()">Regístrate</a></p>
        </div>
    </div>
</ion-content>
