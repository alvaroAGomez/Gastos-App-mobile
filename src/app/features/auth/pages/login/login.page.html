<ion-content class="auth-content">
    <div class="auth-wrapper">

        <!-- Header / Logo -->
        <div class="branding-section">
            <div class="logo-box">
                <ion-icon name="wallet-outline"></ion-icon>
            </div>
            <h1 class="brand-title">GastoSmart</h1>
            <p class="brand-subtitle">Finanzas inteligentes para ti</p>
        </div>

        <!-- Login Card -->
        <div class="auth-card glass-morph">
            <h2 class="card-title">Bienvenido de nuevo</h2>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

                <div class="input-group"
                    [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    <ion-icon name="mail-outline" class="input-icon"></ion-icon>
                    <ion-input type="email" formControlName="email" placeholder="Correo electrónico"
                        autocomplete="email">
                    </ion-input>
                </div>

                <div class="input-group"
                    [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
                    <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="Contraseña" autocomplete="current-password">
                    </ion-input>
                    <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="toggle-pwd"
                        (click)="showPassword = !showPassword">
                    </ion-icon>
                </div>

                <div class="forgot-pwd">
                    <a (click)="onForgotPassword()">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
                    <span *ngIf="!isLoading">Ingresar</span>
                    <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
                    <ion-icon name="arrow-forward-outline" *ngIf="!isLoading"></ion-icon>
                </button>
            </form>

            <div class="divider">
                <span>O USA</span>
            </div>

            <!-- Social Auth Row -->
            <div class="social-row">
                <button class="social-btn" (click)="onSocialLogin(SocialProvider.GOOGLE)">
                    <ion-icon name="logo-google"></ion-icon>
                </button>
                <button class="social-btn" (click)="onSocialLogin(SocialProvider.APPLE)">
                    <ion-icon name="logo-apple"></ion-icon>
                </button>
                <button class="social-btn" (click)="onSocialLogin(SocialProvider.FACEBOOK)">
                    <ion-icon name="logo-facebook"></ion-icon>
                </button>
            </div>
        </div>

        <div class="footer-link">
            <span>¿No tienes una cuenta?</span>
            <a (click)="goToRegister()">Crear cuenta</a>
        </div>
    </div>
</ion-content>
