<ion-content class="ion-padding">
    <div class="register-container">
        <div class="logo-section">
            <ion-icon name="person-add" size="large"></ion-icon>
            <h1>Crear Cuenta</h1>
            <p>Registrate para comenzar</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <ion-item>
                <ion-label position="floating">Nombre</ion-label>
                <ion-input type="text" formControlName="nombre" autocomplete="name">
                </ion-input>
            </ion-item>
            <div class="error-message"
                *ngIf="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched">
                <small *ngIf="registerForm.get('nombre')?.errors?.['required']">El nombre es requerido</small>
                <small *ngIf="registerForm.get('nombre')?.errors?.['minlength']">Mínimo 2 caracteres</small>
            </div>

            <ion-item>
                <ion-label position="floating">Email</ion-label>
                <ion-input type="email" formControlName="email" autocomplete="email">
                </ion-input>
            </ion-item>
            <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                <small *ngIf="registerForm.get('email')?.errors?.['required']">El email es requerido</small>
                <small *ngIf="registerForm.get('email')?.errors?.['email']">Email inválido</small>
            </div>

            <ion-item>
                <ion-label position="floating">Contraseña</ion-label>
                <ion-input type="password" formControlName="password" autocomplete="new-password">
                </ion-input>
            </ion-item>
            <div class="error-message"
                *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                <small *ngIf="registerForm.get('password')?.errors?.['required']">La contraseña es requerida</small>
                <small *ngIf="registerForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres</small>
            </div>

            <ion-item>
                <ion-label position="floating">Confirmar Contraseña</ion-label>
                <ion-input type="password" formControlName="confirmPassword" autocomplete="new-password">
                </ion-input>
            </ion-item>
            <div class="error-message"
                *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched">
                <small>Las contraseñas no coinciden</small>
            </div>

            <ion-button expand="block" type="submit" class="submit-btn" [disabled]="registerForm.invalid">
                Registrarse
            </ion-button>
        </form>

        <div class="login-link">
            <p>¿Ya tienes cuenta? <a (click)="goToLogin()">Inicia sesión</a></p>
        </div>
    </div>
</ion-content>
