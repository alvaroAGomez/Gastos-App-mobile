<app-header title="Categorías" [showBackButton]="false"></app-header>
<ion-content class="ion-padding">
    <ion-list-header>
        <ion-label>Globales</ion-label>
    </ion-list-header>
    <ion-list>
        <ion-item *ngFor="let cat of categoriasGlobales">
            <ion-icon [name]="cat.icono" slot="start"></ion-icon>
            <ion-label>{{ cat.nombre }}</ion-label>
        </ion-item>
    </ion-list>

    <ion-list-header>
        <ion-label>Personalizadas</ion-label>
        <ion-button routerLink="/app/categorias/nueva">Crear</ion-button>
    </ion-list-header>
    <ion-list>
        <ion-item *ngFor="let cat of categoriasPersonales" [routerLink]="['/app/categorias', cat.id, 'editar']">
            <ion-icon [name]="cat.icono" slot="start"></ion-icon>
            <ion-label>{{ cat.nombre }}</ion-label>
        </ion-item>
    </ion-list>
</ion-content>
